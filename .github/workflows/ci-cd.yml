name: CI-CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        echo "### Pip Install Torch Log" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        pip install torch==2.12.0 torchvision==0.27.0 --index-url https://download.pytorch.org/whl/cpu > pip_torch.log 2>&1
        status_torch=$?
        cat pip_torch.log >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        if [ $status_torch -ne 0 ]; then
          exit $status_torch
        fi

        echo "### Pip Install Requirements Log" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        pip install -r requirements.txt > pip_reqs.log 2>&1
        status_reqs=$?
        cat pip_reqs.log >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        if [ $status_reqs -ne 0 ]; then
          exit $status_reqs
        fi

    - name: Run tests with pytest
      run: |
        pytest tests/
