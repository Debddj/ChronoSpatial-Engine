model:
  cnn_extractor:
    input_shape: [3, 224, 224]
    feature_dim: 128
    confidence_threshold: 0.75
  ann_regressor:
    input_dim: 143
    hidden_dims: [256, 128, 64]
    dropout_rate: 0.3
    risk_threshold: 0.80
    max_history: 5
spatial_hyperparameters:
  grid_size: 16
  max_objects: 50
  bounding_box_limit: 50
data_pipeline:
  frame_resolution: [224, 224]
  normalization:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
